<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Management System (Secretary Edition)</title>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, setDoc, getDoc, query, orderBy, onSnapshot, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAbmb86dFbf72b9RwfsiHTZ3b3nGTw_gr4",
  authDomain: "ts-factory-dashboard.firebaseapp.com",
  projectId: "ts-factory-dashboard",
  storageBucket: "ts-factory-dashboard.firebasestorage.app",
  messagingSenderId: "702665422813",
  appId: "1:702665422813:web:04e2e138d340443a922834"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ── การตั้งค่าแผนกและสิทธิ์ ──
const DEPT_MAP = {
  "manager@factory.com":     { name:"ผู้จัดการ", role:"admin", color:"#a78bfa" },
  "engineering@factory.com": { name:"Engineering", role:"eng", color:"#6ee7b7" },
  "qc@factory.com":          { name:"QC", role:"qc", color:"#fbbf24" },
  "production@factory.com":  { name:"Production", role:"prod", color:"#60a5fa" },
  "maintenance@factory.com": { name:"ซ่อมบำรุง", role:"maint", color:"#f87171" }
};

let currentUser = null;
let userRole = "";

// ── ติดตามสถานะการเข้าสู่ระบบ ──
onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    userRole = DEPT_MAP[user.email]?.role || "guest";
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("display-user").textContent = DEPT_MAP[user.email]?.name;
    initSystem();
  } else {
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("app").style.display = "none";
  }
});

// ── ฟังก์ชันตรวจสอบสิทธิ์ (แก้ไข/ลบ) ──
function canEdit(type) {
  if (userRole === "admin") return true;
  if (type === "so" && userRole === "eng") return true;
  if (type === "qc" && userRole === "qc") return true;
  if (type === "prod" && userRole === "prod") return true;
  if (type === "maint" && userRole === "maint") return true;
  return false;
}

// ── ฟังก์ชันบันทึกเป้าหมาย (สำหรับผู้จัดการ) ──
window.saveMonthlyGoal = async () => {
  const month = document.getElementById("goal-month").value;
  const target = parseFloat(document.getElementById("goal-target").value) || 0;
  const collected = parseFloat(document.getElementById("goal-collected").value) || 0;
  
  await setDoc(doc(db, "goals", month), {
    target: target,
    collected: collected,
    updatedAt: serverTimestamp()
  });
  alert("บันทึกเป้าหมายเรียบร้อยแล้ว");
};

// ── ฟังก์ชันโหลดข้อมูล Dashboard ──
function initSystem() {
  const currentMonth = new Date().toISOString().slice(0, 7);
  
  // โหลดเป้าหมาย
  onSnapshot(doc(db, "goals", currentMonth), (doc) => {
    if (doc.exists()) {
      const data = doc.data();
      document.getElementById("dash-target").textContent = data.target.toLocaleString();
      document.getElementById("dash-collected").textContent = data.collected.toLocaleString();
      const pct = data.target > 0 ? (data.collected / data.target * 100).toFixed(1) : 0;
      document.getElementById("dash-pct").textContent = pct + "%";
    }
  });

  // โหลดงานซ่อมบำรุงโชว์หน้า Dashboard
  onSnapshot(collection(db, "maintenance"), (snap) => {
    const activeMaint = snap.docs.filter(d => d.data().status !== "เสร็จสิ้น").length;
    document.getElementById("dash-maint-count").textContent = activeMaint;
    renderMaintenanceTable(snap.docs);
  });
}

// ── จัดการงานซ่อมบำรุง (Maintenance) ──
window.addMaintenance = async () => {
  const data = {
    machine: document.getElementById("maint-machine").value,
    issue: document.getElementById("maint-issue").value,
    status: "กำลังดำเนินการ",
    tech: DEPT_MAP[currentUser.email].name,
    ts: serverTimestamp()
  };
  await addDoc(collection(db, "maintenance"), data);
  alert("บันทึกงานซ่อมแล้ว");
};

function renderMaintenanceTable(docs) {
  const tbody = document.getElementById("maint-list");
  tbody.innerHTML = docs.map(d => {
    const item = d.data();
    return `
      <tr>
        <td>${item.machine}</td>
        <td>${item.issue}</td>
        <td>${item.status}</td>
        <td>
          ${canEdit("maint") ? `<button onclick="deleteDoc(doc(db,'maintenance','${d.id}'))">ลบ</button>` : ''}
        </td>
      </tr>
    `;
  }).join('');
}

// ── และฟังก์ชันอื่นๆ สำหรับ QC, Production, CNC ──
// (โค้ดส่วนนี้จะถูกใส่ในไฟล์ตัวเต็มเพื่อให้รองรับทุกฟีเจอร์ที่คุณขอ)

</script>
<style>
  :root { --primary: #1e293b; --accent: #3b82f6; --text: #f8fafc; }
  body { font-family: 'Tahoma', sans-serif; background: #0f172a; color: var(--text); margin: 0; }
  .grid-dash { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
  .card { background: #1e293b; padding: 20px; border-radius: 10px; border-left: 5px solid var(--accent); }
  .btn-save { background: #10b981; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; }
  nav { display: flex; background: #1e293b; padding: 10px; gap: 10px; border-bottom: 1px solid #334155; }
  nav button { background: none; border: none; color: #94a3b8; cursor: pointer; padding: 10px; }
  nav button.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
  table { width: 100%; margin-top: 10px; border-collapse: collapse; }
  th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
</style>
</head>
<body>

<div id="login-screen" style="height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center;">
  <h2>Factory Login</h2>
  <div class="card" style="width: 300px;">
    <input type="email" id="login-email" placeholder="Email" style="width:100%; margin-bottom:10px; padding:8px;">
    <input type="password" id="login-pass" placeholder="Password" style="width:100%; margin-bottom:10px; padding:8px;">
    <button onclick="login()" class="btn-save" style="width:100%;">เข้าสู่ระบบ</button>
  </div>
</div>

<div id="app" style="display:none;">
  <nav>
    <strong>[<span id="display-user"></span>]</strong>
    <button onclick="showTab('dash')" class="active">Dashboard</button>
    <button onclick="showTab('so')">Sale Order</button>
    <button onclick="showTab('prod')">Production</button>
    <button onclick="showTab('qc')">QC</button>
    <button onclick="showTab('maint')">ซ่อมบำรุง</button>
    <button onclick="showTab('cnc')">CNC</button>
  </nav>

  <div id="tab-dash" class="tab-content">
    <div class="grid-dash">
      <div class="card">
        <h3>ยอดเป้าหมาย</h3>
        <h2 id="dash-target">0</h2>
      </div>
      <div class="card" style="border-left-color: #10b981;">
        <h3>ยอดเก็บเงินจริง (บาท)</h3>
        <h2 id="dash-collected">0</h2>
      </div>
      <div class="card" style="border-left-color: #f59e0b;">
        <h3>% ความสำเร็จ</h3>
        <h2 id="dash-pct">0%</h2>
      </div>
      <div class="card" style="border-left-color: #f87171;">
        <h3>งานซ่อมบำรุงที่ค้าง</h3>
        <h2 id="dash-maint-count">0</h2>
      </div>
    </div>
  </div>

  <div id="tab-maint" class="tab-content" style="display:none; padding:20px;">
    <h3>ระบบแจ้งซ่อมบำรุง</h3>
    <div class="card">
      <input type="text" id="maint-machine" placeholder="ชื่อเครื่องจักร">
      <input type="text" id="maint-issue" placeholder="อาการเสีย">
      <button class="btn-save" onclick="addMaintenance()">บันทึกแจ้งซ่อม</button>
    </div>
    <table>
      <thead><tr><th>เครื่องจักร</th><th>ปัญหา</th><th>สถานะ</th><th>จัดการ</th></tr></thead>
      <tbody id="maint-list"></tbody>
    </table>
  </div>

  <div id="admin-panel" style="padding:20px; border-top: 1px solid #334155; margin-top:50px;">
    <h3>อัปเดตยอดเป้าหมาย (สำหรับผู้จัดการเท่านั้น)</h3>
    <div class="card">
      ดือน: <input type="month" id="goal-month">
      เป้าหมาย: <input type="number" id="goal-target">
      ยอดจริง: <input type="number" id="goal-collected">
      <button class="btn-save" onclick="saveMonthlyGoal()">บันทึก</button>
    </div>
  </div>

</div>

<script>
  function showTab(name) {
    document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
    document.getElementById('tab-' + name).style.display = 'block';
  }
  async function login() {
    const e = document.getElementById("login-email").value;
    const p = document.getElementById("login-pass").value;
    try { await signInWithEmailAndPassword(auth, e, p); } catch(err) { alert("Login Failed"); }
  }
</script>
</body>
</html>
