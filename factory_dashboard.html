<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Dashboard - Secretary Edition</title>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, setDoc, getDoc, query, orderBy, onSnapshot, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAbmb86dFbf72b9RwfsiHTZ3b3nGTw_gr4",
  authDomain: "ts-factory-dashboard.firebaseapp.com",
  projectId: "ts-factory-dashboard",
  storageBucket: "ts-factory-dashboard.firebasestorage.app",
  messagingSenderId: "702665422813",
  appId: "1:702665422813:web:04e2e138d340443a922834"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ── Constants & Permissions ───────────────────────
const DEPT_MAP = {
  "production@factory.com":  { name:"Production", color:"#60a5fa", role:"prod" },
  "qc@factory.com":          { name:"QC",         color:"#fbbf24", role:"qc" },
  "engineering@factory.com": { name:"Engineering", color:"#6ee7b7", role:"eng" },
  "maintenance@factory.com": { name:"ซ่อมบำรุง",   color:"#f87171", role:"maint" },
  "manager@factory.com":     { name:"ผู้จัดการ",    color:"#a78bfa", role:"admin" },
};

const SO_STEPS = ["รับ SO","ตรวจสอบเอกสาร","ตรวจสอบหน้างาน","ทำแบบผลิต","แจกจ่ายแบบ","ผลิตเสร็จ/QC ผ่าน","ติดตั้งหน้างาน","Trial Report","ขึ้นทะเบียนแบบ"];

let currentUser = null, userRole = "";
let currentMonth = new Date().toISOString().slice(0,7);
let _otDocs=[], _qcDocs=[], _prodDocs=[], _soDocs=[], _projDocs=[], _maintDocs=[], _cncDocs=[];
let forecastAmt = 0, realAmt = 0;

// ── Auth & Init ──────────────────────────────────
onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    userRole = DEPT_MAP[user.email]?.role || "guest";
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("user-name").textContent = DEPT_MAP[user.email]?.name || user.email;
    initTabs();
    subscribeData();
    loadGoal();
  } else {
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("app").style.display = "none";
  }
});

function canManage(type) {
  if (userRole === "admin") return true;
  if (type === "so" && userRole === "eng") return true;
  if (type === "qc" && userRole === "qc") return true;
  if (type === "prod" && userRole === "prod") return true;
  if (type === "maint" && userRole === "maint") return true;
  return false;
}

// ── Data Sync ─────────────────────────────────────
async function loadGoal() {
  const snap = await getDoc(doc(db, "forecast", currentMonth));
  if (snap.exists()) {
    forecastAmt = snap.data().amount || 0;
    realAmt = snap.data().realAmount || 0;
  }
  updateDashUI();
}

function subscribeData() {
  onSnapshot(query(collection(db,"ot"), orderBy("ts","desc")), s => { _otDocs = s.docs.map(d=>({id:d.id,...d.data()})); renderLabor(); updateDashUI(); });
  onSnapshot(query(collection(db,"ncr"), orderBy("ts","desc")), s => { _qcDocs = s.docs.map(d=>({id:d.id,...d.data()})); renderQC(); updateDashUI(); });
  onSnapshot(query(collection(db,"daily"), orderBy("ts","desc")), s => { _prodDocs = s.docs.map(d=>({id:d.id,...d.data()})); renderProd(); updateDashUI(); });
  onSnapshot(query(collection(db,"soitems"), orderBy("ts","desc")), s => { _soDocs = s.docs.map(d=>({id:d.id,...d.data()})); renderSO(); });
  onSnapshot(query(collection(db,"maint"), orderBy("ts","desc")), s => { _maintDocs = s.docs.map(d=>({id:d.id,...d.data()})); renderMaint(); updateDashUI(); });
  onSnapshot(query(collection(db,"cnc"), orderBy("ts","desc")), s => { _cncDocs = s.docs.map(d=>({id:d.id,...d.data()})); renderCNC(); });
}

// ── UI Helpers ────────────────────────────────────
function fmtBaht(n){ return Number(n||0).toLocaleString(); }

function initTabs() {
  const tabs = [
    ["page-dashboard","Dashboard"],
    ["page-so","Sale Order"],
    ["page-prod","Production"],
    ["page-qc","QC"],
    ["page-maint","ซ่อมบำรุง"],
    ["page-cnc","CNC Part"],
    ["page-labor","ค่าแรงพนักงาน"],
    ...(userRole==="admin" ? [["page-target","ยอดเป้าหมาย"]] : []),
  ];
  document.getElementById("tabs").innerHTML = tabs.map(([id,l])=> `<button class="tab-btn" onclick="showPage('${id}',this)">${l}</button>`).join("");
  showPage("page-dashboard", document.querySelector(".tab-btn"));
}

window.showPage = (id, btn) => {
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById(id).style.display="block";
  if(btn) btn.classList.add("active");
};

// ── Core Functions ────────────────────────────────
window.saveGoal = async () => {
  if (userRole !== "admin") return alert("เฉพาะผู้จัดการ");
  const month = document.getElementById("target-month").value || currentMonth;
  const target = parseFloat(document.getElementById("target-input").value) || 0;
  const real = parseFloat(document.getElementById("target-real").value) || 0;
  await setDoc(doc(db, "forecast", month), { amount: target, realAmount: real, ts: serverTimestamp() });
  currentMonth = month; loadGoal();
  alert("บันทึกเป้าหมายสำเร็จ");
};

window.advanceStep = async (id, cur, isBack=false) => {
  if (!canManage("so")) return alert("ไม่มีสิทธิ์");
  const next = isBack ? Math.max(0, cur - 1) : Math.min(SO_STEPS.length - 1, cur + 1);
  await updateDoc(doc(db, "soitems", id), { currentStep: next });
};

window.directDelete = async (col, id, type) => {
  if (!canManage(type)) return alert("คุณไม่มีสิทธิ์ลบรายการนี้");
  if (confirm("ยืนยันการลบข้อมูลถาวร?")) {
    await deleteDoc(doc(db, col, id));
  }
};

// ── Render Functions ──────────────────────────────
function updateDashUI() {
  const set = (id, v) => { if(document.getElementById(id)) document.getElementById(id).textContent = v; };
  set("d-target", fmtBaht(forecastAmt));
  set("d-real", fmtBaht(realAmt));
  set("d-real-pct", (forecastAmt > 0 ? (realAmt/forecastAmt*100).toFixed(1) : 0) + "%");
  set("d-maint-count", _maintDocs.filter(d=>d.status!=="เสร็จสิ้น").length);
}

function renderSO() {
  document.getElementById("so-table-body").innerHTML = _soDocs.map(d => `
    <tr>
      <td>${d.soNo}</td>
      <td>${d.projectName}</td>
      <td>${d.itemCode}</td>
      <td>${SO_STEPS[d.currentStep]}</td>
      <td>
        <button class="btn-act btn-ok" onclick="advanceStep('${d.id}',${d.currentStep}, true)">⬅ ย้อนกลับ</button>
        <button class="btn-act btn-ok" onclick="advanceStep('${d.id}',${d.currentStep})">ถัดไป ▶</button>
        <button class="btn-act btn-del" onclick="directDelete('soitems','${d.id}','so')">ลบ</button>
      </td>
    </tr>
  `).join("");
}

// ── (ใส่ Logic สำหรับ Submit ฟอร์มอื่นๆ ที่นี่ เช่น submitQC, submitProd, submitMaint, submitCNC) ──
</script>

<style>
/* CSS ดีไซน์เดิมของคุณ */
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root { --bg:#0f1117; --surface:#181c27; --surface2:#1e2330; --text:#e8eaf0; --muted:#6b7280; --accent:#6ee7b7; --accent3:#f87171; --font:'IBM Plex Sans Thai',sans-serif; }
body { background:var(--bg); color:var(--text); font-family:var(--font); margin:0; }
.topbar { background:var(--surface); border-bottom:1px solid rgba(255,255,255,0.07); padding:10px 20px; display:flex; justify-content:space-between; align-items:center; }
#tabs { display:flex; background:var(--surface); padding:10px 20px 0; gap:5px; border-bottom:1px solid rgba(255,255,255,0.07); overflow-x:auto; }
.tab-btn { background:none; border:none; color:var(--muted); padding:10px 15px; cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; }
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
.content { padding:20px; }
.card { background:var(--surface); border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:20px; margin-bottom:15px; }
.g3 { display:grid; grid-template-columns:repeat(3, 1fr); gap:15px; }
.kpi-card { background:var(--surface2); padding:15px; border-radius:10px; text-align:center; }
.kpi-value { font-size:24px; font-weight:bold; color:var(--accent); margin-top:5px; }
.fg label { font-size:11px; color:var(--muted); display:block; margin-bottom:5px; }
.fg input, .fg select, .fg textarea { width:100%; background:var(--surface2); border:1px solid rgba(255,255,255,0.13); color:white; padding:10px; border-radius:8px; margin-bottom:10px; }
.btn-submit { background:var(--accent); color:#0f1117; border:none; padding:10px 20px; border-radius:8px; font-weight:600; cursor:pointer; }
.btn-act { padding:4px 8px; border-radius:4px; border:none; cursor:pointer; font-size:11px; margin-left:2px; }
.btn-ok { background:rgba(110,231,183,0.15); color:#6ee7b7; }
.btn-del { background:rgba(248,113,113,0.15); color:#f87171; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { text-align:left; color:var(--muted); padding:10px; border-bottom:1px solid rgba(255,255,255,0.1); }
td { padding:10px; border-bottom:1px solid rgba(255,255,255,0.05); }
</style>
</head>
<body>

<div id="login-screen" style="display:flex; height:100vh; align-items:center; justify-content:center;">
  <div class="card" style="width:350px;">
    <h2>Factory Dashboard</h2>
    <div class="fg"><label>Email</label><input type="email" id="email"></div>
    <div class="fg"><label>Password</label><input type="password" id="pass"></div>
    <button class="btn-submit" style="width:100%" onclick="doLogin()">เข้าสู่ระบบ</button>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="topbar">
    <strong>Factory Dashboard</strong>
    <div style="display:flex; align-items:center; gap:10px;">
      <span id="user-name" style="font-size:12px; color:var(--muted);"></span>
      <button class="btn-act btn-del" onclick="signOut(auth)">Logout</button>
    </div>
  </div>
  <div id="tabs"></div>

  <div class="content">
    <div id="page-dashboard" class="page">
      <div class="card">
        <div style="font-size:12px; color:var(--muted); margin-bottom:15px;">ภาพรวมโรงงาน</div>
        <div class="g3">
          <div class="kpi-card"><div>ยอดเป้าหมาย</div><div class="kpi-value" id="d-target">0</div></div>
          <div class="kpi-card"><div>ยอดจริงที่เก็บได้</div><div class="kpi-value" id="d-real" style="color:#6ee7b7">0</div></div>
          <div class="kpi-card"><div>% ความสำเร็จ</div><div class="kpi-value" id="d-real-pct">0%</div></div>
        </div>
        <div class="g3" style="margin-top:15px;">
           <div class="kpi-card"><div>งานซ่อมบำรุงค้าง</div><div class="kpi-value" id="d-maint-count" style="color:#f87171">0</div></div>
        </div>
      </div>
    </div>

    <div id="page-so" class="page">
      <div class="card">
        <table>
          <thead><tr><th>SO No.</th><th>โครงการ</th><th>Item</th><th>สถานะ</th><th>จัดการ</th></tr></thead>
          <tbody id="so-table-body"></tbody>
        </table>
      </div>
    </div>

    <div id="page-prod" class="page">
      <div class="card">
        <div class="card-title">บันทึกรายงานผลิต (Production)</div>
        <div class="fg"><label>กำลังคน Morning Talk</label><input type="number" id="prod-manpower"></div>
        <div class="fg"><label>แผนผลิต (ITEM)</label><input type="number" id="prod-plan"></div>
        <div class="fg"><label>ผลิตจริง (ITEM)</label><input type="number" id="prod-actual"></div>
        <div class="fg"><label>สาเหตุ OT (พิมพ์ระบุ)</label><input type="text" id="prod-ot-reason"></div>
        <button class="btn-submit" onclick="submitProd()">บันทึกรายงาน</button>
      </div>
    </div>

    <div id="page-qc" class="page">
      <div class="card">
        <div class="card-title">บันทึกงาน QC (NCR)</div>
        <div class="fg"><label>โครงการ</label><input type="text" id="qc-project"></div>
        <div class="fg"><label>แบบบ้าน</label><input type="text" id="qc-model"></div>
        <div class="fg"><label>แปลง</label><input type="text" id="qc-lot"></div>
        <div class="fg"><label>รายละเอียดของเสีย</label><textarea id="qc-defect"></textarea></div>
        <button class="btn-submit" onclick="submitQC()">บันทึก QC</button>
      </div>
    </div>

    <div id="page-maint" class="page">
      <div class="card">
        <div class="card-title">แผนกซ่อมบำรุง</div>
        <div class="fg"><label>เครื่องจักร/อุปกรณ์</label><input type="text" id="maint-mc"></div>
        <div class="fg"><label>อาการเสีย</label><input type="text" id="maint-issue"></div>
        <button class="btn-submit" onclick="submitMaint()">แจ้งซ่อม</button>
      </div>
    </div>

    <div id="page-cnc" class="page">
      <div class="card">
        <div class="card-title">งาน CNC Part Support</div>
        <div class="fg"><label>รายการ Part</label><input type="text" id="cnc-part"></div>
        <div class="fg"><label>เครื่องจักรที่ใช้</label><input type="text" id="cnc-mc"></div>
        <div class="fg"><label>เป้าหมาย</label><input type="number" id="cnc-target"></div>
        <div class="fg"><label>ผลิตจริง</label><input type="number" id="cnc-real"></div>
        <button class="btn-submit" onclick="submitCNC()">บันทึก CNC</button>
      </div>
    </div>

    <div id="page-target" class="page">
      <div class="card">
        <div class="fg"><label>เดือน</label><input type="month" id="target-month"></div>
        <div class="fg"><label>ยอดเป้าหมาย (บาท)</label><input type="number" id="target-input"></div>
        <div class="fg"><label>ยอดจริงที่เก็บเงินได้ (บาท)</label><input type="number" id="target-real"></div>
        <button class="btn-submit" onclick="saveGoal()">บันทึกเป้าหมาย</button>
      </div>
    </div>

  </div>
</div>

<script>
// ฟังก์ชันเสริมอื่นๆ เช่น Login
async function doLogin() {
  const e = document.getElementById("email").value;
  const p = document.getElementById("pass").value;
  try { await signInWithEmailAndPassword(auth, e, p); } catch(err) { alert("Login Error"); }
}
</script>
</body>
</html>
